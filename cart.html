<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart – Momo</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<!-- Custom CSS -->
<link rel="stylesheet" href="assets/css/style.css">


<style>
body { font-family: 'Poppins', sans-serif; padding-top: 70px; }
.section-title { text-align: center; margin-bottom: 50px; }
.table thead { background-color: #f8f9fa; }
.table tbody tr:hover { background-color: #f1f1f1; transition: 0.3s; }
.btn-update, .btn-remove { transition: 0.3s; }
.btn-update:hover, .btn-remove:hover { transform: translateY(-3px); }
.order-summary { border: 1px solid #ddd; padding: 20px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,.05); }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">MOMO</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="pricing.html">Pricing</a></li>
        <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
        <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
        <li class="nav-item"><a class="nav-link" href="checkout.html">Checkout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Cart Section -->
<section class="section py-5">
  <div class="container">
    <div class="section-title">
      <h2>Your Shopping Cart</h2>
    </div>
    <div class="row g-4">

      <!-- Cart Items Table -->
      <div class="col-lg-8">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th scope="col">Item</th>
                <th scope="col">Price</th>
                <th scope="col">Quantity</th>
                <th scope="col">Subtotal</th>
                <th scope="col">Action</th>
              </tr>
            </thead>
            <tbody id="cart-items">
              <tr>
                <td>Italian Pizza</td>
                <td>$12.99</td>
                <td><input type="number" class="form-control quantity" value="1" min="1"></td>
                <td class="subtotal">$12.99</td>
                <td>
                  <button class="btn btn-sm btn-outline-primary btn-update"><i class="fas fa-sync-alt"></i></button>
                  <button class="btn btn-sm btn-outline-danger btn-remove"><i class="fas fa-trash"></i></button>
                </td>
              </tr>
              <tr>
                <td>Classic Burger</td>
                <td>$8.99</td>
                <td><input type="number" class="form-control quantity" value="2" min="1"></td>
                <td class="subtotal">$17.98</td>
                <td>
                  <button class="btn btn-sm btn-outline-primary btn-update"><i class="fas fa-sync-alt"></i></button>
                  <button class="btn btn-sm btn-outline-danger btn-remove"><i class="fas fa-trash"></i></button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="col-lg-4">
        <div class="order-summary">
          <h4>Order Summary</h4>
          <p>Subtotal: <span id="order-subtotal">$30.97</span></p>
          <p>Delivery: <span id="order-delivery">$3.00</span></p>
          <hr>
          <h5>Total: <span id="order-total">$33.97</span></h5>
          <a href="checkout.html" class="btn btn-primary w-100 mt-3">Proceed to Checkout</a>
        </div>
      </div>

    </div>
  </div>
</section>

<footer class="footer bg-dark text-light text-center py-4">
  <p>&copy; 2026 MOMO. All Rights Reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Update subtotal and total dynamically
function updateTotals() {
  const rows = document.querySelectorAll('#cart-items tr');
  let subtotal = 0;
  rows.forEach(row => {
    const price = parseFloat(row.cells[1].innerText.replace('$',''));
    const qty = parseInt(row.querySelector('.quantity').value);
    const rowSubtotal = (price * qty).toFixed(2);
    row.querySelector('.subtotal').innerText = '$' + rowSubtotal;
    subtotal += parseFloat(rowSubtotal);
  });
  const delivery = 3.00;
  document.getElementById('order-subtotal').innerText = '$' + subtotal.toFixed(2);
  document.getElementById('order-total').innerText = '$' + (subtotal + delivery).toFixed(2);
}

// Event listeners
document.querySelectorAll('.btn-update').forEach(btn => {
  btn.addEventListener('click', updateTotals);
});
document.querySelectorAll('.quantity').forEach(input => {
  input.addEventListener('change', updateTotals);
});
document.querySelectorAll('.btn-remove').forEach(btn => {
  btn.addEventListener('click', e => {
    e.target.closest('tr').remove();
    updateTotals();
  });
});

// Initialize totals
updateTotals();
</script>

</body>
</html>
