<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | MOMO</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:#f6f7fb;
  padding-top:72px;
}

/* Cards */
.card{
  border:none;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* Buttons */
.btn-primary{
  font-weight:600;
}
.btn-primary:hover{
  transform:translateY(-2px);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">MOMO Kitchens</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
        <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
        <li class="nav-item"><a class="nav-link active" href="checkout.html">Checkout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- CHECKOUT -->
<section class="py-5">
  <div class="container">

    <div class="text-center mb-5">
      <h2 class="fw-bold">Checkout</h2>
      <p class="text-muted">Confirm your order and delivery details</p>
    </div>

    <div class="row g-4">

      <!-- FORM -->
      <div class="col-lg-7">
        <div class="card p-4">
          <h5 class="mb-3">Billing & Delivery</h5>

          <form id="checkoutForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <input class="form-control" placeholder="First Name" required>
              </div>
              <div class="col-md-6 mb-3">
                <input class="form-control" placeholder="Last Name" required>
              </div>
            </div>

            <input class="form-control mb-3" type="email" placeholder="Email" required>
            <input class="form-control mb-3" placeholder="Phone" required>
            <input class="form-control mb-3" placeholder="Address" required>
            <input class="form-control mb-3" placeholder="City" required>

            <textarea class="form-control" rows="3" placeholder="Order Notes (optional)"></textarea>
          </form>
        </div>
      </div>

      <!-- SUMMARY -->
      <div class="col-lg-5">
        <div class="card p-4">
          <h5 class="mb-3">Order Summary</h5>

          <ul class="list-group mb-3" id="orderItems"></ul>

          <div class="d-flex justify-content-between">
            <span>Subtotal</span>
            <strong id="subtotal">$0.00</strong>
          </div>

          <div class="d-flex justify-content-between">
            <span>Delivery</span>
            <strong>$3.00</strong>
          </div>

          <hr>

          <div class="d-flex justify-content-between fs-5">
            <strong>Total</strong>
            <strong id="total">$0.00</strong>
          </div>

          <button id="placeOrder" class="btn btn-primary w-100 mt-4">
            <i class="fa fa-check-circle"></i> Place Order
          </button>
        </div>
      </div>

    </div>
  </div>
</section>

<footer class="bg-dark text-light text-center py-3">
  &copy; 2026 MOMO. All Rights Reserved.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ================= CART STORAGE ================= */
const cart = JSON.parse(localStorage.getItem('cart')) || [];
const orderItems = document.getElementById('orderItems');
const subtotalEl = document.getElementById('subtotal');
const totalEl = document.getElementById('total');

let subtotal = 0;

// Render cart
cart.forEach(item => {
  subtotal += item.price * item.qty;

  orderItems.innerHTML += `
    <li class="list-group-item d-flex justify-content-between">
      ${item.name} x${item.qty}
      <span>$${(item.price * item.qty).toFixed(2)}</span>
    </li>
  `;
});

subtotalEl.textContent = `$${subtotal.toFixed(2)}`;
totalEl.textContent = `$${(subtotal + 3).toFixed(2)}`;


// Local Storage Keys
momoCart
momoOrders
momoReservations
momoAdmin

/* ================= PLACE ORDER ================= */
const placeOrderBtn = document.querySelector('.btn-place-order');

placeOrderBtn.addEventListener('click', () => {

  const cart = JSON.parse(localStorage.getItem('momoCart')) || [];

  if(cart.length === 0){
    alert("Your cart is empty");
    return;
  }

  const order = {
    id: Date.now(),
    items: cart,
    total: cart.reduce((t,i)=>t+i.price*i.qty,0),
    date: new Date().toLocaleString(),
    status: "Pending"
  };

  const orders = JSON.parse(localStorage.getItem('momoOrders')) || [];
  orders.push(order);

  localStorage.setItem('momoOrders', JSON.stringify(orders));
  localStorage.removeItem('momoCart');

  window.location.href = "order-success.html";
});
</script>

</body>
</html>
