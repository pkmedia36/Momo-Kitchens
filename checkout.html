<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | MOMO</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* ================= BASE ================= */
body{
  font-family:'Poppins',sans-serif;
  background:#0b0b0b;
  color:#fff;
  padding-top:72px;
}

/* ================= NEON ================= */
.neon-text{
  color:#0ff;
  text-shadow:0 0 6px #0ff,0 0 18px #0ff;
  animation:pulse 1.6s infinite alternate;
}
@keyframes pulse{
  from{ text-shadow:0 0 6px #0ff; }
  to{ text-shadow:0 0 24px #0ff; }
}

/* ================= CARDS ================= */
.card{
  background:#111;
  border:none;
  border-radius:18px;
  box-shadow:0 0 35px rgba(0,255,255,.15);
}

/* ================= FORM ================= */
.form-control, textarea{
  background:#000;
  border:1px solid #0ff;
  color:#0ff;
}
.form-control:focus, textarea:focus{
  background:#000;
  color:#0ff;
  box-shadow:0 0 15px rgba(0,255,255,.6);
  border-color:#0ff;
}

/* ================= BUTTON ================= */
.btn-neon{
  background:transparent;
  border:1px solid #0ff;
  color:#0ff;
  font-weight:600;
  transition:.3s;
}
.btn-neon:hover{
  background:#0ff;
  color:#000;
  box-shadow:0 0 25px #0ff;
  transform:translateY(-2px);
}

/* ================= LIST ================= */
.list-group-item{
  background:#000;
  border:1px solid rgba(0,255,255,.2);
  color:#fff;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){
  h2{ font-size:1.8rem; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black fixed-top shadow">
  <div class="container">
    <a class="navbar-brand neon-text fw-bold" href="index.html">MOMO Kitchens</a>
  </div>
</nav>

<!-- CHECKOUT -->
<section class="py-5">
<div class="container">

  <div class="text-center mb-5">
    <h2 class="neon-text fw-bold">Checkout</h2>
    <p class="text-muted">Confirm your order & delivery details</p>
  </div>

  <div class="row g-4">

    <!-- FORM -->
    <div class="col-lg-7">
      <div class="card p-4">
        <h5 class="mb-3 neon-text">Billing & Delivery</h5>

        <form id="checkoutForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <input class="form-control" placeholder="First Name" required>
            </div>
            <div class="col-md-6 mb-3">
              <input class="form-control" placeholder="Last Name" required>
            </div>
          </div>

          <input class="form-control mb-3" type="email" placeholder="Email" required>
          <input class="form-control mb-3" placeholder="Phone" required>
          <input class="form-control mb-3" placeholder="Address" required>
          <input class="form-control mb-3" placeholder="City" required>

          <textarea class="form-control" rows="3" placeholder="Order notes (optional)"></textarea>
        </form>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="col-lg-5">
      <div class="card p-4">
        <h5 class="mb-3 neon-text">Order Summary</h5>

        <ul class="list-group mb-3" id="orderItems"></ul>

        <div class="d-flex justify-content-between">
          <span>Subtotal</span>
          <strong id="subtotal">$0.00</strong>
        </div>

        <div class="d-flex justify-content-between">
          <span>Delivery</span>
          <strong>$3.00</strong>
        </div>

        <hr>

        <div class="d-flex justify-content-between fs-5">
          <strong>Total</strong>
          <strong id="total">$0.00</strong>
        </div>

        <button id="placeOrder" class="btn btn-neon w-100 mt-4">
          <i class="fa fa-check-circle"></i> Place Order
        </button>
      </div>
    </div>

  </div>
</div>
</section>

<footer class="bg-black text-light text-center py-3">
  &copy; 2026 MOMO Kitchens. All Rights Reserved.
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ================= LOAD CART ================= */
const cart = JSON.parse(localStorage.getItem('momoCart')) || [];
const orderItems = document.getElementById('orderItems');
const subtotalEl = document.getElementById('subtotal');
const totalEl = document.getElementById('total');

let subtotal = 0;

cart.forEach(item => {
  subtotal += item.price * item.qty;
  orderItems.innerHTML += `
    <li class="list-group-item d-flex justify-content-between">
      ${item.name} x${item.qty}
      <span>$${(item.price * item.qty).toFixed(2)}</span>
    </li>
  `;
});

subtotalEl.textContent = `$${subtotal.toFixed(2)}`;
totalEl.textContent = `$${(subtotal + 3).toFixed(2)}`;

/* ================= PLACE ORDER ================= */
document.getElementById('placeOrder').addEventListener('click', () => {

  if(cart.length === 0){
    alert("Your cart is empty");
    return;
  }

  const order = {
    id: Date.now(),
    items: cart,
    total: subtotal + 3,
    date: new Date().toLocaleString(),
    status: "Pending"
  };

  const orders = JSON.parse(localStorage.getItem('momoOrders')) || [];
  orders.push(order);

  localStorage.setItem('momoOrders', JSON.stringify(orders));
  localStorage.removeItem('momoCart');

  window.location.href = "order-success.html";
});
</script>

</body>
</html>
