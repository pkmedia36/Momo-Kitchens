<!DOCTYPE html>
<html lang="en">
<head>

<!-- ====== SEO META ====== -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Contact MOMO – Reach out for inquiries, support, or collaborations. We’re here to help you anytime.">
<meta name="keywords" content="MOMO restaurant, contact MOMO, food support, restaurant contact">
<meta name="author" content="MOMO">
<meta property="og:title" content="Contact Us – MOMO">
<meta property="og:description" content="Get in touch with MOMO. We’d love to hear from you.">
<meta property="og:type" content="website">

<title>Contact Us | MOMO</title>

<!-- ====== BOOTSTRAP ====== -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ====== ICONS & FONTS ====== -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* ================= ROOT ================= */
:root{
  --neon:#00ffff;
  --dark:#0b0f14;
}

/* ================= GLOBAL ================= */
body{
  font-family:'Poppins',sans-serif;
  background:#0a0d12;
  color:#fff;
  padding-top:72px;
}

/* ================= NAVBAR ================= */
.neon-navbar{
  background:#0b0f14;
}

.neon-navbar .nav-link,
.neon-navbar .navbar-brand{
  color:#fff;
  position:relative;
  transition:.3s;
}

.neon-navbar .nav-link.active,
.neon-navbar .nav-link:hover,
.neon-navbar .navbar-brand:hover{
  color:var(--neon);
  text-shadow:0 0 8px var(--neon);
}

/* Neon underline */
.neon-navbar .nav-link::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-4px;
  width:0;
  height:2px;
  background:var(--neon);
  transition:.3s;
}
.neon-navbar .nav-link:hover::after,
.neon-navbar .nav-link.active::after{
  width:100%;
}

/* Mobile slide */
@media(max-width:992px){
  .navbar-collapse{
    background:#0b0f14;
    border-radius:0 0 18px 18px;
    padding:20px;
    transform:translateX(-100%);
    transition:.4s ease;
  }
  .navbar-collapse.show{
    transform:translateX(0);
  }
}

/* ================= SECTION ================= */
.section-title h2{
  font-weight:700;
  text-shadow:0 0 12px var(--neon);
}

/* ================= FORM ================= */
.form-control{
  background:#0f1621;
  border:1px solid #1f2a3a;
  color:#fff;
}
.form-control:focus{
  background:#0f1621;
  color:#fff;
  border-color:var(--neon);
  box-shadow:0 0 12px rgba(0,255,255,.6);
}

/* Neon Button */
.btn-neon{
  background:transparent;
  border:2px solid var(--neon);
  color:var(--neon);
  font-weight:600;
  transition:.3s;
}
.btn-neon:hover{
  background:var(--neon);
  color:#000;
  box-shadow:0 0 25px var(--neon);
  transform:translateY(-2px);
}

/* ================= MAP ================= */
.map-container iframe{
  width:100%;
  height:420px;
  border-radius:16px;
  border:0;
}

/* ================= FOOTER ================= */
footer{
  background:#0b0f14;
  border-top:1px solid #1f2a3a;
}
</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg fixed-top neon-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">MOMO Kitchens</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="reservation.html">Book Table</a></li>
        <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
        <li class="nav-item"><a class="nav-link" href="team.html">Team</a></li>
        <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- ================= CONTACT ================= -->
<section class="py-5">
  <div class="container">
    <div class="section-title text-center mb-5">
      <h2>Contact Us</h2>
      <p class="text-secondary">We’re ready to connect with you</p>
    </div>

    <div class="row g-4 align-items-stretch">

      <!-- FORM -->
      <div class="col-lg-6">
        <form id="contactForm" class="p-4 rounded bg-dark shadow-lg">
          <input class="form-control mb-3" placeholder="Your Name" required>
          <input class="form-control mb-3" type="email" placeholder="Your Email" required>
          <input class="form-control mb-3" placeholder="Subject">
          <textarea class="form-control mb-4" rows="5" placeholder="Message" required></textarea>
          <button class="btn btn-neon w-100">
            <i class="fa fa-paper-plane"></i> Send Message
          </button>
        </form>
      </div>

      <!-- MAP -->
      <div class="col-lg-6">
        <div class="map-container shadow-lg">
          <iframe loading="lazy"
            src="https://www.google.com/maps?q=Sharjah&output=embed"></iframe>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- ================= FOOTER ================= -->
<footer class="text-center py-4">
  <p class="mb-0">&copy; 2026 MOMO. All Rights Reserved.</p>
</footer>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Active link detection
document.querySelectorAll('.nav-link').forEach(link=>{
  if(link.href === window.location.href){
    link.classList.add('active');
  }
});

// Fake submit (demo)
document.getElementById('contactForm').addEventListener('submit',e=>{
  e.preventDefault();
  alert('Message sent successfully!');
  e.target.reset();
});
</script>

</body>
</html>
