<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed | MOMO</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* ================= BASE ================= */
body{
  font-family:'Poppins',sans-serif;
  background:#0b0b0b;
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ================= NEON ================= */
.neon{
  color:#0ff;
  text-shadow:0 0 8px #0ff,0 0 22px #0ff;
  animation:pulse 1.5s infinite alternate;
}
@keyframes pulse{
  from{ text-shadow:0 0 8px #0ff; }
  to{ text-shadow:0 0 30px #0ff; }
}

/* ================= CARD ================= */
.success-card{
  background:#111;
  border-radius:20px;
  padding:40px 30px;
  max-width:520px;
  width:100%;
  text-align:center;
  box-shadow:0 0 40px rgba(0,255,255,.2);
  animation:slideUp .8s ease;
}
@keyframes slideUp{
  from{ transform:translateY(40px); opacity:0; }
  to{ transform:translateY(0); opacity:1; }
}

/* ================= ICON ================= */
.success-icon{
  font-size:4.5rem;
  margin-bottom:15px;
  animation:pop .6s ease;
}
@keyframes pop{
  0%{ transform:scale(0); }
  80%{ transform:scale(1.2); }
  100%{ transform:scale(1); }
}

/* ================= BUTTON ================= */
.btn-neon{
  border:1px solid #0ff;
  color:#0ff;
  background:transparent;
  padding:12px;
  font-weight:600;
  transition:.3s;
}
.btn-neon:hover{
  background:#0ff;
  color:#000;
  box-shadow:0 0 25px #0ff;
}

/* ================= MOBILE ================= */
@media(max-width:576px){
  .success-card{
    padding:30px 20px;
  }
}
</style>
</head>

<body>

<div class="success-card">
  <div class="success-icon neon">
    <i class="fa fa-check-circle"></i>
  </div>

  <h2 class="neon fw-bold">Order Successful!</h2>
  <p class="text-muted mt-2">
    Thank you for ordering from <strong>MOMO Kitchens</strong>.<br>
    Your food is being prepared 🍕🔥
  </p>

  <hr class="my-4">

  <p class="small text-muted">
    Order ID: <span id="orderId"></span><br>
    Estimated Delivery: 30–45 minutes
  </p>

  <div class="d-grid gap-2 mt-4">
    <a href="menu.html" class="btn btn-neon">Order More</a>
    <a href="index.html" class="btn btn-outline-light">Back to Home</a>
  </div>
</div>

<script>
/* Generate fake order ID */
document.getElementById('orderId').textContent =
  'MOMO-' + Math.floor(100000 + Math.random() * 900000);
</script>

</body>
</html>
