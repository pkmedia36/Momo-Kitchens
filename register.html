<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register – Momo</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<!-- Custom CSS -->
<link rel="stylesheet" href="assets/css/style.css">

<style>
body { font-family: 'Poppins', sans-serif; background: #f8f9fa; }
.register-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.register-card { padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,.1); background: #fff; transition: transform 0.3s; }
.register-card:hover { transform: translateY(-5px); }
.register-card h2 { font-weight: 600; margin-bottom: 25px; }
.form-control:focus { box-shadow: none; border-color: #007bff; }
.btn-register { width: 100%; transition: 0.3s; }
.btn-register:hover { transform: translateY(-3px); }
.text-center a { text-decoration: none; color: #007bff; }
</style>
</head>
<body>

<section class="register-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="register-card">
          <h2 class="text-center">Register</h2>
          <form id="registerForm">
            <div class="mb-3">
              <input type="text" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="mb-3">
              <input type="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="mb-3">
              <input type="password" class="form-control" placeholder="Password" required>
            </div>
            <div class="mb-3">
              <input type="password" class="form-control" placeholder="Confirm Password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-register">Register</button>
            <p class="text-center mt-3">Already have an account? <a href="login.html">Login</a></p>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', function(e){
  e.preventDefault();
  alert('Registration successful! (Demo only)');
  this.reset();
});
</script>

</body>
</html>
