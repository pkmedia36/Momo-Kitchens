/* Neon Pulse Animation */
@keyframes neonPulse {

/* ===============================
   TEAM – RESPONSIVE FIX
================================ */

/* Card Base */
.team-card {
  background: #111;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,255,255,0.12);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

/* Image */
.team-img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  transition: transform 0.4s ease;
}

/* Card Content */
.team-info {
  padding: 18px;
  text-align: center;
}

.team-info h5 {
  font-size: 1.05rem;
  font-weight: 700;
  margin-bottom: 4px;
  color: #0ff;
}

.team-info p {
  font-size: 0.9rem;
  color: #aaa;
  margin-bottom: 12px;
}

/* Social Icons */
.team-social a {
  font-size: 0.9rem;
  margin: 0 6px;
  color: #0ff;
  transition: transform 0.25s ease, color 0.25s ease;
}

.team-social a:hover {
  color: #fff;
  transform: scale(1.2);
}

/* Desktop Hover Only */
@media (hover: hover) {
  .team-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 40px rgba(0,255,255,0.3);
  }

  .team-card:hover .team-img {
    transform: scale(1.05);
  }
}

/* ===============================
   MOBILE OPTIMIZATION
================================ */

  }

  .hero-video h1 {
    font-size: 1.9rem;
  }

  .team-img {

  }

  .team-info {
    padding: 14px;
  }

  .team-info h5 {
    font-size: 1rem;
  }

  .team-info p {
    font-size: 0.85rem;
  }

  /* Disable lift on touch */
  .team-card {
    transform: none !important;
  }
}

<!-- JS: Active Page & Scroll Reveal -->
<script>
document.addEventListener("DOMContentLoaded",()=>{
  // Active navbar link detection
  const links = document.querySelectorAll(".nav-link");
  const current = location.pathname.split("/").pop();
  links.forEach(link=>{
    if(link.getAttribute("href")===current) link.classList.add("active");
  });

  // Scroll reveal for team cards
  const cards = document.querySelectorAll(".team-card");
  const reveal = () => {
    const triggerBottom = window.innerHeight / 5 * 4;
    cards.forEach(card => {
      const cardTop = card.getBoundingClientRect().top;
      if(cardTop < triggerBottom) card.classList.add("visible");
    });
  };
  window.addEventListener('scroll', reveal);
  reveal();
});

document.addEventListener("DOMContentLoaded", () => {
  const video = document.querySelector(".hero-video-bg");

  if (video) {
    video.muted = true;
    video.play().catch(() => {
      // Retry on user interaction (mobile safety)
      document.addEventListener("touchstart", () => video.play(), { once: true });
    });
  }
});
</script>
