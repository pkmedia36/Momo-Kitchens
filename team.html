<!-- Custom Inline CSS -->
<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0; padding: 0;
  background:#0b0b0b; color:#fff;
}

/* Hero Video Section */
.hero-video {
  position: relative;
  height: 70vh;
  overflow: hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero-video video {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:-1;
  filter: brightness(0.5);
}
.hero-video h1 {
  font-size:3rem;
  color:#0ff;
  text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
  animation: neonPulse 1.5s infinite alternate;
}

/* Neon Pulse Animation */
@keyframes neonPulse {
  from { text-shadow:0 0 5px #0ff,0 0 10px #0ff; }
  to { text-shadow:0 0 20px #0ff,0 0 30px #0ff; }
}

/* Section Titles */
.section-title { text-align:center; margin:50px 0; }
.section-title h2 { color:#0ff; text-shadow:0 0 5px #0ff,0 0 15px #0ff; }
.section-title p { color:#ccc; }

/* Team Cards */
.team-card {
  border-radius: 12px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,255,255,0.1);
  transition: transform 0.4s, box-shadow 0.4s;
  background:#111;
  opacity:0;
  transform: translateY(30px);
}
.team-card.visible { 
  opacity:1; 
  transform: translateY(0); 
  transition: transform 0.6s ease, opacity 0.6s ease;
}
.team-card:hover {
  transform: translateY(-10px);
  box-shadow:0 20px 40px rgba(0,255,255,0.3);
}
.team-card img { width:100%; height:300px; object-fit:cover; transition: transform 0.4s; }
.team-card:hover img { transform: scale(1.05); }
.team-info { padding:20px; text-align:center; }
.team-info h5 { font-weight:700; margin-bottom:5px; color:#0ff; text-shadow:0 0 5px #0ff,0 0 15px #0ff; }
.team-info p { font-size:0.95rem; color:#aaa; }
.team-social a { margin:0 8px; color:#0ff; transition: transform 0.3s, color 0.3s; position:relative; }
.team-social a:hover { color:#fff; transform:scale(1.3); }

/* Navbar Neon & Active */
.navbar .nav-link.active, .navbar .nav-link:hover { color:#0ff !important; text-shadow:0 0 5px #0ff,0 0 15px #0ff; }
</style>

<!-- JS: Active Page & Scroll Reveal -->
<script>
document.addEventListener("DOMContentLoaded",()=>{
  // Active navbar link detection
  const links = document.querySelectorAll(".nav-link");
  const current = location.pathname.split("/").pop();
  links.forEach(link=>{
    if(link.getAttribute("href")===current) link.classList.add("active");
  });

  // Scroll reveal for team cards
  const cards = document.querySelectorAll(".team-card");
  const reveal = () => {
    const triggerBottom = window.innerHeight / 5 * 4;
    cards.forEach(card => {
      const cardTop = card.getBoundingClientRect().top;
      if(cardTop < triggerBottom) card.classList.add("visible");
    });
  };
  window.addEventListener('scroll', reveal);
  reveal();
});
</script>
